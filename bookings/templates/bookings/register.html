{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4">
            <h2 class="text-center mb-4 fw-bold">Создать аккаунт</h2>
            
            <form method="POST">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="alert alert-danger small">
                        Пожалуйста, исправьте ошибки в полях формы.
                    </div>
                {% endif %}

                <!-- Форма будет выглядеть аккуратно благодаря стилям из base.html -->
                <div class="mb-3">
                    {{ form.as_p }}
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">Зарегистрироваться</button>
            </form>

            <div class="mt-4 text-center">
                <p class="text-muted">Уже есть аккаунт? <a href="{% url 'login' %}" class="fw-bold text-decoration-none">Войти</a></p>
                <a href="{% url 'home' %}" class="small text-secondary text-decoration-none">← На главную</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
