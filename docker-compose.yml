services:
  # Django приложение
  web:
    build: .
    command: >
      sh -c "python3 manage.py migrate &&
             python3 manage.py fill_db &&
             python3 manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  # FastAPI приложение
  fastapi:
    build: .
    command: python3 -m uvicorn fastapi_app:app --host 0.0.0.0 --port 8001
    volumes:
      - .:/app
    ports:
      - "8001:8001"
